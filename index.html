<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MonkeyMunch</title>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }
    body { background:#111; color:white; }

    .navbar {
      background:#1c1c1c;
      padding:15px;
      display:flex;
      justify-content:space-between;
      border-bottom:2px solid #333;
    }

    .navbar h1 { color:#00ff99; }

    .navbar button {
      margin-left:5px;
      padding:8px 12px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      background:#00ff99;
      font-weight:bold;
    }

    .container { padding:20px; }

    .panel {
      background:#1a1a1a;
      padding:20px;
      border-radius:10px;
      border:1px solid #333;
      margin-bottom:20px;
    }

    .input-group { margin-bottom:10px; display:flex; flex-direction:column; }
    .input-group input {
      padding:8px;
      border:none;
      border-radius:6px;
      background:#2a2a2a;
      color:white;
    }

    .main-btn {
      width:100%;
      padding:10px;
      background:#00ff99;
      border:none;
      border-radius:8px;
      font-weight:bold;
      cursor:pointer;
      margin-top:10px;
    }

    .hidden { display:none; }

    .cosmetics-grid {
      display:grid;
      grid-template-columns:repeat(2, 1fr);
      gap:10px;
    }

    .item {
      display:flex;
      justify-content:space-between;
      padding:10px;
      background:#222;
      border-radius:8px;
    }

    .item img {
      width:40px;
      height:40px;
      border-radius:6px;
    }

    .admin-btn {
      background:#ffaa00;
      border:none;
      padding:4px 6px;
      border-radius:5px;
      cursor:pointer;
      font-weight:bold;
    }

    .del-btn {
      background:red;
      color:white;
      border:none;
      padding:4px 6px;
      border-radius:5px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="navbar hidden" id="navbar">
  <h1>MonkeyMunch</h1>
  <div>
    <button onclick="showShop()">Shop</button>
    <button id="adminButton" class="hidden" onclick="showAdmin()">Admin</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">

  <!-- HOME -->
  <div id="homePage">
    <h1 style="color:#00ff99;">MonkeyMunch</h1>

    <input id="signupUsername" placeholder="Username">
    <input id="signupPassword" placeholder="Password">
    <button onclick="signup()">Sign Up</button>

    <br><br>

    <input id="loginUsername" placeholder="Login Username">
    <input id="loginPassword" placeholder="Login Password">
    <button onclick="login()">Login</button>
  </div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel" class="panel hidden">
    <h2>Admin Panel</h2>

    <input id="itemName" placeholder="Item Name">
    <input id="itemId" placeholder="Item ID">
    <input id="cosmeticType" placeholder="Type">
    <input id="cost" placeholder="Cost">
    <input id="itemIcon" placeholder="Icon URL">
    <input id="backgroundImage" placeholder="Background URL">
    <input id="description" placeholder="Description">

    <button id="addCosmeticBtn" class="main-btn" onclick="addCosmetic()">Add Cosmetic</button>
  </div>

  <!-- SHOP -->
  <div id="shopPage" class="hidden">
    <div class="panel">
      <h2>Shop</h2>
      <div class="cosmetics-grid" id="cosmeticsGrid"></div>
    </div>
  </div>

</div>

<script>
const adminUsers = ["CoolDuck","Memez","NewAdmin"];
let editingIndex = -1;

function isAdminUser(u){
  return adminUsers.some(a => a.toLowerCase() === (u||"").toLowerCase().trim());
}

function getCosmetics(){
  return JSON.parse(localStorage.getItem("cosmetics")) || [];
}

function saveCosmetics(c){
  localStorage.setItem("cosmetics", JSON.stringify(c));
}

function signup(){
  let u=document.getElementById("signupUsername").value;
  let p=document.getElementById("signupPassword").value;
  let users=JSON.parse(localStorage.getItem("users")||"[]");

  if(users.find(x=>x.u===u)) return alert("Taken");

  users.push({u,p});
  localStorage.setItem("users",JSON.stringify(users));
}

function login(){
  let u=document.getElementById("loginUsername").value;
  let p=document.getElementById("loginPassword").value;

  let users=JSON.parse(localStorage.getItem("users")||"[]");
  let ok=users.find(x=>x.u===u&&x.p===p);

  if(!ok) return alert("Wrong");

  localStorage.setItem("user",u);
  start();
}

function start(){
  let u=localStorage.getItem("user");
  if(!u) return;

  document.getElementById("homePage").classList.add("hidden");
  document.getElementById("navbar").classList.remove("hidden");
  document.getElementById("shopPage").classList.remove("hidden");

  if(isAdminUser(u)){
    document.getElementById("adminButton").classList.remove("hidden");
  }

  load();
}

function logout(){
  localStorage.removeItem("user");
  location.reload();
}

function showAdmin(){
  document.getElementById("adminPanel").classList.remove("hidden");
  document.getElementById("shopPage").classList.add("hidden");
}

function showShop(){
  document.getElementById("adminPanel").classList.add("hidden");
  document.getElementById("shopPage").classList.remove("hidden");
}

function addCosmetic(){
  let items=getCosmetics();

  let obj={
    name:itemName.value,
    id:itemId.value,
    type:cosmeticType.value,
    cost:cost.value,
    icon:itemIcon.value,
    bg:backgroundImage.value,
    desc:description.value
  };

  if(editingIndex>=0){
    items[editingIndex]=obj;
    editingIndex=-1;
    addCosmeticBtn.innerText="Add Cosmetic";
  } else {
    items.push(obj);
  }

  saveCosmetics(items);
  load();
}

function editCosmetic(i){
  let c=getCosmetics()[i];
  editingIndex=i;

  itemName.value=c.name;
  itemId.value=c.id;
  cosmeticType.value=c.type;
  cost.value=c.cost;
  itemIcon.value=c.icon;
  backgroundImage.value=c.bg;
  description.value=c.desc;

  addCosmeticBtn.innerText="Save Changes";

  showAdmin();
}

function deleteCosmetic(i){
  let items=getCosmetics();
  items.splice(i,1);
  saveCosmetics(items);
  load();
}

function load(){
  let grid=document.getElementById("cosmeticsGrid");
  grid.innerHTML="";

  getCosmetics().forEach((c,i)=>{
    let div=document.createElement("div");
    div.className="item";

    div.innerHTML=`
      <div>
        <img src="${c.icon}">
        <div>${c.name}</div>
        <div style="color:#aaa">${c.type}</div>
      </div>

      <div>
        <div onclick="alert('${c.id}\\n${c.desc}')"
             style="color:#00ff99;cursor:pointer">${c.id}</div>

        <button class="admin-btn" onclick="editCosmetic(${i})">!</button>
        <button class="del-btn" onclick="deleteCosmetic(${i})">X</button>
      </div>
    `;

    grid.appendChild(div);
  });
}

start();
</script>

</body>
</html>
